name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Official uv installer; matches the .python-version pin (3.12).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # --frozen fails loudly if uv.lock has drifted from pyproject.toml,
      # enforcing the committed lockfile (guidelines §8.4).
      - name: Install workspace (uv sync --frozen)
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      # Coverage threshold is config-driven: the ≥85% gate lives in
      # [tool.coverage.report].fail_under in pyproject.toml (task 0.9), so this
      # step carries no hard-coded number that could diverge from config.
      - name: Tests + coverage (pytest, fail under 85%)
        run: uv run pytest --cov --cov-report=term-missing

      - name: HTML test + coverage report
        run: |
          mkdir -p results
          uv run pytest --cov --cov-report=html:results/coverage_html --html=results/report.html --self-contained-html

      - name: Upload HTML reports
        uses: actions/upload-artifact@v4
        with:
          name: html-reports
          path: results/
          if-no-files-found: error

      - name: 150-line file check
        run: |
          if [ -f scripts/check_line_limit.py ]; then
            uv run python scripts/check_line_limit.py
          else
            echo "line-limit check pending task 0.10 (scripts/check_line_limit.py absent)"
          fi

      - name: Secret scan
        run: |
          if [ -f scripts/secret_scan.py ]; then
            uv run python scripts/secret_scan.py
          else
            echo "secret scan pending task 0.11 (scanner absent)"
          fi